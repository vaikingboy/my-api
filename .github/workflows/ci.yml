# Workflow name — shown in the GitHub Actions UI
name: CI — Build, Test, Push

# ── When to run this workflow ────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ── Variables shared across all jobs ─────────────────────────────
env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ════════════════════════════════════════════════════════════════
  # JOB 1: Lint and Test
  # Runs on EVERY push and EVERY pull request.
  # Job 2 will NOT run if this job fails.
  # ════════════════════════════════════════════════════════════════
  test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your repository code onto the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install Node.js 20 with npm package caching
      # "cache: npm" caches the ~/.npm folder between runs.
      # Cache key = hash of package-lock.json.
      # Unchanged packages: restored from cache (~5s vs ~60s).
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install exact versions from package-lock.json
      # npm ci is faster than npm install and never changes the lockfile
      - name: Install dependencies
        run: npm ci

      # Step 4: Run ESLint — pipeline fails on any lint error
      - name: Run linter
        run: npm run lint

      # Step 5: Run Jest with coverage
      - name: Run tests with coverage
        run: npm run test:cov

      # Step 6: Save coverage report as downloadable artifact
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7


  # ════════════════════════════════════════════════════════════════
  # JOB 2: Build and push Docker image to GHCR
  # Conditions for this job to run:
  #   1. "needs: test" — Job 1 must have passed
  #   2. "if:" — must be a push to the main branch
#        (not a PR, not a push to develop)
  # ════════════════════════════════════════════════════════════════
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Required to push to GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Log in to GitHub Container Registry
      # secrets.GITHUB_TOKEN is automatically provided — no setup needed
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags from git metadata
      # This creates three tags:
      #   sha-a1b2c3d  (short commit SHA — for traceability)
      #   latest       (always points to newest main build)
      #   main         (always points to newest main build)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest
            type=ref,event=branch

      # Build and push with GitHub Actions cache
      # cache-from/cache-to reuses Docker layers between runs
      # Typical speedup: 3-4 minutes → 30-45 seconds
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max